name: 'Archive Artifacts as Release (no custom token)'
description: |
  Downloads artifacts from a workflow run in the current repo,
  combines them into a single archive, and publishes them as a release.

inputs:
  run_id:
    description: 'ID of the workflow run whose artifacts will be downloaded'
    required: true

  artifact_names:
    description: >
      Optional comma-separated list of artifact names to download.
      If empty, all artifacts from the run are downloaded.
    required: false
    default: ''

  release_tag:
    description: 'Tag for the release (e.g., v1.0.0)'
    required: true

  release_name:
    description: 'Title of the release (defaults to the tag)'
    required: false
    default: ''

  body:
    description: 'Release description'
    required: false
    default: ''

  draft:
    description: 'Create as draft release'
    required: false
    default: 'false'

  prerelease:
    description: 'Mark as pre-release'
    required: false
    default: 'false'

  target_commitish:
    description: 'Commitish the tag will point to (default: current commit)'
    required: false
    default: ${{ github.sha }}

  combine_artifacts:
    description: 'Bundle all artifacts into a single .tar.gz archive'
    required: false
    default: 'true'

  combined_archive_name:
    description: 'Base name for the combined archive (without extension)'
    required: false
    default: 'release-assets'

runs:
  using: 'composite'
  steps:
    - name: Resolve artifact URLs
      id: urls
      shell: bash
      env:
        RUN_ID: ${{ inputs.run_id }}
        ARTIFACT_NAMES: ${{ inputs.artifact_names }}
        GITHUB_TOKEN: ${{ github.token }}   # default token, always present
      run: |
        set -euo pipefail
        REPO="$GITHUB_REPOSITORY"
        API_URL="https://api.github.com/repos/$REPO/actions/runs/$RUN_ID/artifacts"
        echo "Fetching artifacts from $API_URL"

        response=$(curl -fsSL -H "Authorization: Bearer $GITHUB_TOKEN" \
                          -H "Accept: application/vnd.github+json" \
                          "$API_URL")

        if [[ -n "$ARTIFACT_NAMES" ]]; then
          names_regex=$(echo "$ARTIFACT_NAMES" | tr ',' '|' | sed 's/ *//g')
          selected=$(echo "$response" | jq --arg names "$names_regex" \
            '[.artifacts[] | select(.name | test($names; "i"))]')
        else
          selected=$(echo "$response" | jq '.artifacts')
        fi

        count=$(echo "$selected" | jq 'length')
        echo "Found $count matching artifact(s)"

        if [[ "$count" -eq 0 ]]; then
          echo "url_list=" >> $GITHUB_OUTPUT
          exit 0
        fi

        urls=$(echo "$selected" | jq -r '.[].archive_download_url')
        {
          echo 'url_list<<EOF'
          echo "$urls"
          echo 'EOF'
        } >> $GITHUB_OUTPUT
        echo "Resolved URLs:"
        echo "$urls"

    - name: Download artifacts
      shell: bash
      env:
        GITHUB_TOKEN: ${{ github.token }}
        URLS: ${{ steps.urls.outputs.url_list }}
        DOWNLOAD_DIR: ${{ runner.temp }}/artifacts_download
      run: |
        set -euo pipefail
        mkdir -p "$DOWNLOAD_DIR"
        cd "$DOWNLOAD_DIR"

        readarray -t urls <<< "$URLS"
        if [[ ${#urls[@]} -eq 0 || ( ${#urls[@]} -eq 1 && -z "${urls[0]}" ) ]]; then
          echo "No artifact URLs to download. Exiting."
          exit 0
        fi

        counter=0
        for url in "${urls[@]}"; do
          [[ -z "$url" ]] && continue
          echo "::group::Downloading $url"

          headers_file=$(mktemp)
          http_code=$(curl -w "%{http_code}" -o "artifact_${counter}.zip" \
                      -D "$headers_file" \
                      -H "Authorization: Bearer $GITHUB_TOKEN" \
                      -fsSL "$url") || true

          echo "HTTP status: $http_code"
          if [[ "$http_code" != "200" ]]; then
            echo "ERROR: Download failed (HTTP $http_code)"
            echo "Response headers:"
            cat "$headers_file"
            if [[ -f "artifact_${counter}.zip" ]]; then
              echo "First bytes of response:"
              head -c 200 "artifact_${counter}.zip" | xxd | head -n 10
            fi
            exit 1
          fi
          ((counter++))
          rm -f "$headers_file"
          echo "Downloaded → artifact_$((counter-1)).zip"
          echo "::endgroup::"
        done
        echo "All artifacts downloaded successfully."

    - name: Combine artifacts (optional)
      if: inputs.combine_artifacts == 'true'
      shell: bash
      env:
        DOWNLOAD_DIR: ${{ runner.temp }}/artifacts_download
        ARCHIVE_NAME: ${{ inputs.combined_archive_name }}
      run: |
        cd "$DOWNLOAD_DIR"
        archive="${ARCHIVE_NAME}.tar.gz"
        tar -czf "$archive" *
        echo "Combined archive created: $archive"

    - name: Create or update release
      shell: bash
      env:
        GITHUB_TOKEN: ${{ github.token }}
        TAG: ${{ inputs.release_tag }}
        TITLE: ${{ inputs.release_name }}
        BODY: ${{ inputs.body }}
        DRAFT: ${{ inputs.draft }}
        PRERELEASE: ${{ inputs.prerelease }}
        TARGET: ${{ inputs.target_commitish }}
        COMBINE: ${{ inputs.combine_artifacts }}
        COMBINED_ARCHIVE_NAME: ${{ inputs.combined_archive_name }}
        DOWNLOAD_DIR: ${{ runner.temp }}/artifacts_download
      run: |
        set -euo pipefail
        if ! command -v gh &>/dev/null; then
          curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg | sudo dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg
          echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" | sudo tee /etc/apt/sources.list.d/github-cli.list >/dev/null
          sudo apt-get update && sudo apt-get install -y gh
        fi

        cd "$DOWNLOAD_DIR"

        if [[ "$COMBINE" == "true" ]]; then
          archive="${COMBINED_ARCHIVE_NAME}.tar.gz"
          assets=("$archive")
        else
          shopt -s nullglob
          assets=(*)
        fi

        if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" &>/dev/null; then
          echo "Release '$TAG' exists → uploading assets"
          gh release upload "$TAG" "${assets[@]}" --repo "$GITHUB_REPOSITORY" --clobber
        else
          echo "Creating release '$TAG'"
          flags=()
          [[ -n "$TITLE" ]] && flags+=(--title "$TITLE")
          [[ -n "$BODY" ]] && flags+=(--notes "$BODY")
          [[ "$DRAFT" == "true" ]] && flags+=(--draft)
          [[ "$PRERELEASE" == "true" ]] && flags+=(--prerelease)
          [[ -n "$TARGET" ]] && flags+=(--target "$TARGET")
          gh release create "$TAG" "${assets[@]}" --repo "$GITHUB_REPOSITORY" "${flags[@]}"
        fi
