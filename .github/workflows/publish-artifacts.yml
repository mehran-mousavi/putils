name: Collect and Publish Artifacts
on:
  workflow_dispatch:
    inputs:
      run_id:
        description: 'Workflow run ID'
        required: true
        type: string
      release_tag:
        description: 'Release tag (e.g., v1.0.0)'
        required: true
        type: string

permissions:
  contents: write   # needed to create releases and upload assets
  actions: read     # needed to download artifacts (default token)

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Archive artifacts and release
        uses: ./.github/actions/archive-release
        with:
          run_id: ${{ github.event.inputs.run_id }}
          release_tag: ${{ github.event.inputs.release_tag }}
          release_name: 'Release ${{ github.event.inputs.release_tag }}'
          # body can be customised
