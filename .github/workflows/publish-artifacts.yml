name: Collect and Publish Artifacts
on:
  workflow_dispatch:
    inputs:
      run_id:
        description: 'Workflow run ID (e.g., 25328445178)'
        required: true

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Archive artifacts from run and release
        uses: ./.github/actions/archive-release
        with:
          run_id: ${{ github.event.inputs.run_id }}
          release_tag: 'v1.0.0'
          release_name: 'Release v1.0.0'
          body: 'Artifacts from run ${{ github.event.inputs.run_id }}'
          # For cross-repo runs, provide a PAT with actions:read scope
          download_token: ${{ secrets.PAT_TOKEN }}   # create this secret!
