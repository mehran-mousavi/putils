name: Collect and Publish Artifacts

on:
  workflow_dispatch:
    inputs:
      run_id:
        description: 'Workflow run ID whose artifacts will be packaged'
        required: true
        type: string
      release_tag:
        description: 'Release tag (e.g., v1.0.0)'
        required: true
        type: string
      artifact_names:
        description: 'Optional comma-separated artifact name filter (empty = all artifacts from the run)'
        required: false
        type: string
        default: ''

permissions:
  contents: write
  actions: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Archive artifacts and release
        uses: ./.github/actions/archive-release
        with:
          run_id: ${{ github.event.inputs.run_id }}
          release_tag: ${{ github.event.inputs.release_tag }}
          release_name: Release ${{ github.event.inputs.release_tag }}
          artifact_names: ${{ github.event.inputs.artifact_names }}
